<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Template Builder</title>
  <style>
    @media print {
      body > div,
      body > div > section:first-child { display: none !important; }
      body > div > section:last-child {
        border: none !important;
        position: static !important;
        flex: none !important;
      }
      #preview-wrapper {
        position: static !important;
        overflow: visible !important;
        padding: 0 !important;
        background: #fff !important;
      }
      #contract-content {
        box-shadow: none !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        margin-bottom: 0 !important;
      }
      .bloco-controles, .edit-ui { display: none !important; }
      div[style*="position: absolute; bottom: 0"] { display: none !important; }
      div[style*="padding: 16px 16px 8px"] { display: none !important; }
    }
  </style>
  <style>
    * { font-family: Arial, Helvetica, sans-serif; }

    /* --- Preview: aparência de documento impresso --- */
    #preview-wrapper {
      background: #e8e8e8;
      padding: 24px 24px 48px;
      min-height: 100%;
      box-sizing: border-box;
    }

    #contract-content {
      background: #fff;
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 56px 64px;
      margin-bottom: 100px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #000;
    }

    /* Blocos de seção */
    #contract-content .bloco[data-type="secao"] p {
      text-align: center;
      font-weight: bold;
      text-transform: uppercase;
      margin: 24px 0 16px;
      font-size: 11pt;
    }

    /* Blocos de cláusula por nível */
    #contract-content .bloco[data-type="clausula"] p {
      text-align: justify;
      margin: 6px 0 14px;
      font-size: 11pt;
    }

    #contract-content .bloco[data-type="clausula"][data-level="segundo"] p {
      margin-left: 24px;
    }

    #contract-content .bloco[data-type="clausula"][data-level="terceiro"] p {
      margin-left: 48px;
    }

    /* Índice em negrito */
    #contract-content .bloco-indice {
      font-weight: bold;
    }

    /* Controles flutuantes: não afetam o layout do texto */
    #contract-content .bloco-controles {
      font-size: 9pt;
      margin-bottom: 2px;
    }

    /* Blocos não são selecionáveis — garante drag no bloco inteiro */
    #contract-content .bloco {
      user-select: none;
    }

    /* Campo de edição inline */
    #contract-content .edit-ui {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11pt;
    }

    /* Dentro do modo de edição, texto deve ser selecionável */
    #contract-content .edit-ui [contenteditable] {
      user-select: text;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <div style="display: flex; height: 100vh;">

    <!-- Formulário -->
    <section style="flex: 0 0 40%; padding: 16px; overflow-y: auto;">

      <form>

        <!-- ── Seção 1: Templates ── -->
        <h3 style="margin: 0 0 8px;">Templates</h3>
        <fieldset>
          <label><input type="radio" name="tipo_template" value="novo"> Novo template</label>
          <div id="custom-templates-list"></div>
        </fieldset>

        <div id="campos-template" style="display: none;">

          <!-- ── Seção 2: Dados do Template ── -->
          <h3 style="margin: 20px 0 8px;">Dados do Template</h3>
          <fieldset>
            <legend>Nome</legend>
            <input type="text" id="input-nome-template" placeholder="Nome do template" style="width:100%; padding:4px; box-sizing:border-box;">
            <div id="erro-nome-template" style="display:none; color:#c00; font-size:12px; margin-top:4px;"></div>
          </fieldset>

          <br>

          <fieldset>
            <legend>Tipo</legend>
            <label><input type="radio" name="tipo_contrato" value="contrato"> Contrato</label><br>
            <label><input type="radio" name="tipo_contrato" value="anexo"> Anexo</label><br>
            <label><input type="radio" name="tipo_contrato" value="aditivo"> Aditivo</label>
          </fieldset>

          <br>

          <fieldset>
            <legend>Status</legend>
            <label><input type="radio" name="status_template" value="inativo"> Inativo</label><br>
            <label><input type="radio" name="status_template" value="ativo"> Ativo</label>
          </fieldset>

          <br>

          <fieldset id="fieldset-versao">
            <legend>Versão</legend>
            <label><input type="radio" name="versao_template" value="major"> Major (ex: v16)</label><br>
            <label><input type="radio" name="versao_template" value="minor"> Minor (ex: v15.9)</label><br>
            <label style="display:inline-block; margin-top:6px;">Número: <input type="text" id="input-versao-numero" placeholder="ex: v16" style="margin-left:4px; padding:2px 4px; width:80px;"></label>
          </fieldset>

          <!-- ── Seção 3: Conteúdo ── -->
          <h3 style="margin: 20px 0 8px;">Conteúdo</h3>
          <fieldset>
            <legend>Tipo do Conteúdo</legend>
            <label><input type="radio" name="tipo_bloco" value="secao"> Seção</label>
            <label><input type="radio" name="tipo_bloco" value="clausula"> Cláusula</label>
          </fieldset>

          <br>

          <!-- Campo Seção -->
          <div id="campo-secao" style="display: none;">
            <label>Título da Seção</label><br>
            <div id="toolbar-secao">
              <button type="button" onclick="document.execCommand('bold')"><b>B</b></button>
              <button type="button" onclick="document.execCommand('italic')"><i>I</i></button>
              <button type="button" onclick="document.execCommand('underline')"><u>U</u></button>
              <button type="button" onclick="document.execCommand('strikeThrough')" style="text-decoration:line-through;">S</button>
              <button type="button" onclick="insertLink('editor-secao')">🔗</button>
            </div>
            <div id="editor-secao" contenteditable="true" style="border: 1px solid black; min-height: 60px; padding: 4px;" oninput="syncAdicionarSecao()"></div>
            <div class="campo-condicional" style="margin-top: 8px;">
              <label style="font-size: 12px; color: #666;">Exibir somente se</label><br>
              <div style="display: flex; gap: 6px; align-items: center; margin-top: 4px;">
                <select id="cond-secao-variavel" style="flex: 1;">
                  <option value="">(sempre exibir)</option>
                  <option value="contract_id">contract_id</option>
                  <option value="modalidade_garantia">modalidade_garantia</option>
                </select>
                <select id="cond-secao-operador" style="flex: 1;">
                  <option value="==">igual a</option>
                  <option value="!=">diferente de</option>
                  <option value=">">maior que</option>
                  <option value="<">menor que</option>
                  <option value="contains">contém</option>
                </select>
                <select id="cond-secao-valor" style="flex: 1;">
                  <option value="">selecionar valor...</option>
                  <option value="fianca_garantida">fianca_garantida</option>
                </select>
              </div>
            </div>
            <br>
            <div id="erro-cond-secao" style="display:none; color:#c00; font-size:12px; margin-bottom:4px;"></div>
            <button type="button" id="btn-adicionar-secao" disabled style="opacity:0.4;">Adicionar</button>
          </div>

          <!-- Campo Cláusula -->
          <div id="campo-clausula" style="display: none;">
            <label>Conteúdo da Cláusula</label><br>
            <div id="toolbar-clausula">
              <button type="button" onclick="document.execCommand('bold')"><b>B</b></button>
              <button type="button" onclick="document.execCommand('italic')"><i>I</i></button>
              <button type="button" onclick="document.execCommand('underline')"><u>U</u></button>
              <button type="button" onclick="document.execCommand('strikeThrough')" style="text-decoration:line-through;">S</button>
              <button type="button" onclick="insertLink('editor-clausula')">🔗</button>
            </div>
            <div id="editor-clausula" contenteditable="true" style="border: 1px solid black; min-height: 120px; padding: 4px;" oninput="syncAdicionarClausula()"></div>
            <div style="margin-top: 6px; display: flex; gap: 6px; align-items: center;">
              <select id="select-variavel">
                <option value="">Selecionar variável...</option>
                <option value="{{contract_id}}">{{contract_id}}</option>
                <option value="{{modalidade_garantia}}">{{modalidade_garantia}}</option>
              </select>
              <button type="button" id="btn-inserir-variavel">Inserir variável</button>
            </div>
            <div class="campo-condicional" style="margin-top: 8px;">
              <label style="font-size: 12px; color: #666;">Exibir somente se</label><br>
              <div style="display: flex; gap: 6px; align-items: center; margin-top: 4px;">
                <select id="cond-clausula-variavel" style="flex: 1;">
                  <option value="">(sempre exibir)</option>
                  <option value="contract_id">contract_id</option>
                  <option value="modalidade_garantia">modalidade_garantia</option>
                </select>
                <select id="cond-clausula-operador" style="flex: 1;">
                  <option value="==">igual a</option>
                  <option value="!=">diferente de</option>
                  <option value=">">maior que</option>
                  <option value="<">menor que</option>
                  <option value="contains">contém</option>
                </select>
                <select id="cond-clausula-valor" style="flex: 1;">
                  <option value="">selecionar valor...</option>
                  <option value="fianca_garantida">fianca_garantida</option>
                </select>
              </div>
            </div>
            <br>
            <div id="erro-cond-clausula" style="display:none; color:#c00; font-size:12px; margin-bottom:4px;"></div>
            <button type="button" id="btn-adicionar-clausula" disabled style="opacity:0.4;">Adicionar</button>
          </div>

        </div>

      </form>
    </section>

    <!-- Preview -->
    <section style="flex: 0 0 60%; border-left: 1px solid #000; position: relative;">
      <div style="padding: 16px 16px 8px; border-bottom: 1px solid #ddd;">
        <h2 style="margin: 0;">Preview</h2>
      </div>
      <div id="preview-wrapper" style="position: absolute; top: 53px; bottom: 53px; left: 0; right: 0; overflow-y: auto;">
        <div id="contract-content"></div>
      </div>
      <div id="modal-link" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:6px; padding:20px; width:320px; box-shadow:0 4px 16px rgba(0,0,0,0.2);">
          <label style="font-size:13px; font-weight:bold;">URL do link</label><br>
          <input id="input-link-url" type="text" placeholder="https://..." style="width:100%; margin-top:6px; padding:5px 7px; box-sizing:border-box; font-size:13px;">
          <div id="erro-link-url" style="display:none; color:#c00; font-size:12px; margin-top:5px;"></div>
          <div style="margin-top:12px; text-align:right; display:flex; gap:8px; justify-content:flex-end;">
            <button id="btn-link-cancelar" type="button">Cancelar</button>
            <button id="btn-link-confirmar" type="button">Inserir</button>
          </div>
        </div>
      </div>

      <div style="position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; border-top: 1px solid #ddd; background: #fff; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 6px; align-items: center;">
          <button id="btn-salvar-padrao" type="button">Salvar template</button>
          <button id="btn-salvar-novo" type="button" style="display:none;">Salvar novo template</button>
        </div>
        <div>
          <button id="btn-exportar-pdf" type="button" disabled>Exportar PDF</button>
          <span style="display: inline-block; width: 8px;"></span>
          <button id="btn-exportar-html" type="button" disabled>Exportar HTML</button>
        </div>
      </div>
    </section>

  </div>

  <script>
    // --- Exibe campos e reage à seleção de tipo de template ---
    function onTipoTemplateChange(radio) {
      document.getElementById('campos-template').style.display = 'block';
      if (radio.value === 'novo') {
        setCurrentTemplate(null);
        // Limpa o preview
        document.querySelectorAll('#contract-content .bloco').forEach(function(b) { b.remove(); });
        renumberBlocks();
        // Limpa seleção dos outros campos
        document.querySelectorAll('input[name="status_template"]').forEach(function(r) { r.checked = false; });
        document.querySelectorAll('input[name="versao_template"]').forEach(function(r) { r.checked = false; });
        document.getElementById('input-versao-numero').value = '';
        document.querySelectorAll('input[name="tipo_contrato"]').forEach(function(r) { r.checked = false; });
        document.querySelectorAll('input[name="tipo_bloco"]').forEach(function(r) { r.checked = false; });
        document.getElementById('campo-secao').style.display    = 'none';
        document.getElementById('campo-clausula').style.display = 'none';
        document.getElementById('editor-secao').innerHTML    = '';
        document.getElementById('editor-clausula').innerHTML = '';
      }
      // Templates salvos são carregados pelo listener em addCustomTemplateRadio
    }

    document.querySelectorAll('input[name="tipo_template"]').forEach(function(radio) {
      radio.addEventListener('change', function() { onTipoTemplateChange(this); });
    });

    // --- Marca dirty ao mudar status, versão ou tipo ---
    document.querySelectorAll('input[name="status_template"], input[name="versao_template"], input[name="tipo_contrato"]').forEach(function(radio) {
      radio.addEventListener('change', markDirty);
    });
    document.getElementById('input-versao-numero').addEventListener('input', markDirty);

    // --- Esconde versão para tipos sem versionamento ---
    function syncVersaoVisibility() {
      var tipoEl  = document.querySelector('input[name="tipo_contrato"]:checked');
      var tipo    = tipoEl ? tipoEl.value : '';
      var esconde = tipo === 'anexo' || tipo === 'aditivo';
      document.getElementById('fieldset-versao').style.display = esconde ? 'none' : '';
    }
    document.querySelectorAll('input[name="tipo_contrato"]').forEach(function(r) {
      r.addEventListener('change', syncVersaoVisibility);
    });
    syncVersaoVisibility();

    // --- Exibe campo de acordo com tipo do bloco ---
    document.querySelectorAll('input[name="tipo_bloco"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        document.getElementById('campo-secao').style.display    = this.value === 'secao'    ? 'block' : 'none';
        document.getElementById('campo-clausula').style.display = this.value === 'clausula' ? 'block' : 'none';
      });
    });

    // --- Formatação de índice (sempre numérico) ---
    function formatIndex(level, c) {
      if (level === 'primeiro') return c.l1 + '.';
      if (level === 'segundo')  return c.l1 + '.' + c.l2 + '.';
      if (level === 'terceiro') return c.l1 + '.' + c.l2 + '.' + c.l3 + '.';
    }

    // --- Renumeração ---
    // Seções reiniciam a contagem dos blocos abaixo delas.

    function formatHTML(html) {
      const INLINE = new Set(['span','b','i','u','strong','em','a','br']);
      let indent = 0;
      const tab = '  ';

      // Tokeniza tags e texto
      const tokens = html.match(/(<[^>]+>|[^<]+)/g) || [];
      const lines = [];

      tokens.forEach(function(token) {
        const isTag = token.startsWith('<');
        if (!isTag) {
          const text = token.replace(/\s+/g, ' ').trim();
          if (text) lines.push(tab.repeat(indent) + text);
          return;
        }

        const isClose   = token.startsWith('</');
        const isSelf    = /\/>$/.test(token);
        const tagName   = (token.match(/<\/?([a-zA-Z][a-zA-Z0-9-]*)/) || [])[1] || '';
        const isInline  = INLINE.has(tagName.toLowerCase());

        if (isClose && !isInline) {
          indent = Math.max(0, indent - 1);
          lines.push(tab.repeat(indent) + token);
        } else if (isSelf || isInline) {
          lines.push(tab.repeat(indent) + token);
        } else {
          lines.push(tab.repeat(indent) + token);
          indent++;
        }
      });

      return lines.join('\n');
    }

    // ── Gerador de PDF puro (sem dependências externas) ──────────────────────
    // Usa Helvetica (fonte built-in do PDF), encoding WinAnsiEncoding (CP1252)
    // que cobre todos os caracteres portugueses.

    const WIN_ANSI = (function() {
      const map = {};
      // Latin-1 (0x00-0xFF) é base; complementa com Windows-1252 extras
      const extras = {
        '€':128,'‚':130,'ƒ':131,'„':132,'…':133,
        '†':134,'‡':135,'ˆ':136,'‰':137,'Š':138,
        '‹':139,'Œ':140,'Ž':142,'‘':145,'’':146,
        '“':147,'”':148,'•':149,'–':150,'—':151,
        '˜':152,'™':153,'š':154,'›':155,'œ':156,
        'ž':158,'Ÿ':159
      };
      for (let i = 0; i < 256; i++) map[String.fromCharCode(i)] = i;
      Object.assign(map, extras);
      return map;
    })();

    function encodeWinAnsi(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const b = WIN_ANSI[str[i]];
        bytes.push(b !== undefined ? b : 63); // '?' para desconhecidos
      }
      return bytes;
    }

    function pdfStr(str) {
      // Retorna string PDF entre parênteses com escape dos bytes
      const bytes = encodeWinAnsi(str);
      let out = '(';
      for (const b of bytes) {
        if (b === 40 || b === 41 || b === 92) out += '\\' + String.fromCharCode(b);
        else if (b < 32 || b > 126) out += '\\' + b.toString(8).padStart(3,'0');
        else out += String.fromCharCode(b);
      }
      return out + ')';
    }

    // Largura aproximada de char em Helvetica (em unidades / 1000 pt)
    const HEL_WIDTHS = (function() {
      // Caracteres comuns; resto usa 556 (largura média Helvetica)
      const w = {};
      '!"#$%&\'()*+,-./:;<=>?@[\\]^_`{|}~'.split('').forEach(function(c){ w[c]=278; });
      w[' ']=278; w['f']=278; w['i']=222; w['j']=222; w['l']=222; w['r']=333;
      w['t']=278; w['!']=278; w[',']=278; w['.']=278; w[';']=278; w[':']=278;
      w['m']=833; w['w']=722; w['M']=833; w['W']=944;
      return w;
    })();

    function charWidth(c, bold, fontSize) {
      const base = HEL_WIDTHS[c] || 556;
      return (base / 1000) * fontSize * (bold ? 1.05 : 1);
    }

    function textWidth(str, bold, fontSize) {
      let w = 0;
      for (const c of str) w += charWidth(c, bold, fontSize);
      return w;
    }

    function wrapText(str, maxWidth, bold, fontSize) {
      const words = str.split(' ');
      const lines = [];
      let cur = '';
      for (const word of words) {
        const test = cur ? cur + ' ' + word : word;
        if (textWidth(test, bold, fontSize) <= maxWidth) {
          cur = test;
        } else {
          if (cur) lines.push(cur);
          cur = word;
        }
      }
      if (cur) lines.push(cur);
      return lines.length ? lines : [''];
    }

    // Extrai runs de texto de um elemento p: [{text, bold, italic, underline}]
    function extractRuns(pEl) {
      const runs = [];
      function walk(node, bold, italic, underline) {
        if (node.nodeType === 3) {
          if (node.textContent) runs.push({text: node.textContent, bold, italic, underline});
        } else {
          const tag = node.tagName ? node.tagName.toLowerCase() : '';
          const b2 = bold   || tag === 'b' || tag === 'strong';
          const i2 = italic || tag === 'i' || tag === 'em';
          const u2 = underline || tag === 'u';
          node.childNodes.forEach(function(c){ walk(c, b2, i2, u2); });
        }
      }
      walk(pEl, false, false, false);
      return runs;
    }

    function generateContractPDF(blocks) {
      const PW = 595.28, PH = 841.89;
      const ML = 56, MR = 56, MT = 56, MB = 56;
      const TW = PW - ML - MR;
      const FS = 11;          // font size pt
      const LH = FS * 1.6;   // line height pt

      const pages = [[]]; // pages[i] = array of PDF content stream lines

      let y = PH - MT; // current y position (PDF y goes up)

      function newPage() {
        pages.push([]);
        y = PH - MT;
      }

      function ensureSpace(needed) {
        if (y - needed < MB) newPage();
      }

      function addLine(pdfLine) {
        pages[pages.length - 1].push(pdfLine);
      }

      function renderLine(text, bold, xOffset, align) {
        ensureSpace(LH);
        const fontName = bold ? '/F2' : '/F1';
        const x = ML + xOffset;
        const yPos = y - FS;

        let cmd;
        if (align === 'center') {
          const tw = textWidth(text, bold, FS);
          const cx = ML + (TW - tw) / 2;
          cmd = 'BT ' + fontName + ' ' + FS + ' Tf ' +
                cx.toFixed(2) + ' ' + yPos.toFixed(2) + ' Td ' +
                pdfStr(text) + ' Tj ET';
        } else {
          cmd = 'BT ' + fontName + ' ' + FS + ' Tf ' +
                x.toFixed(2) + ' ' + yPos.toFixed(2) + ' Td ' +
                pdfStr(text) + ' Tj ET';
        }
        addLine(cmd);
        y -= LH;
      }

      blocks.forEach(function(block) {
        const type  = block.dataset.type;
        const level = block.dataset.level || 'primeiro';
        const p     = block.querySelector('p');
        if (!p) return;

        const indexEl = p.querySelector('.bloco-indice');
        const indexText = indexEl ? (indexEl.textContent + ' ') : '';

        // Texto limpo sem o span do índice
        const runs = extractRuns(p).filter(function(r) {
          return !(indexEl && r.text === indexEl.textContent);
        });
        const fullText = runs.map(function(r){ return r.text; }).join('');
        const hasBoldRun = runs.some(function(r){ return r.bold; });

        if (type === 'secao') {
          // Espaço antes da seção
          ensureSpace(LH * 2);
          y -= LH * 0.5;
          const upper = fullText.toUpperCase();
          renderLine(upper, true, 0, 'center');
          y -= LH * 0.5;
          return;
        }

        // Cláusula
        const indent = level === 'segundo' ? 24 : level === 'terceiro' ? 48 : 0;
        const lineW  = TW - indent;
        const bold   = hasBoldRun || !!indexText;

        // Primeira linha com índice + início do texto
        const combined = indexText + fullText;
        const lines    = wrapText(combined, lineW, false, FS);

        // Linha 1: índice em bold + resto normal (simplificado: tudo numa linha)
        lines.forEach(function(line, i) {
          renderLine(line, i === 0 && !!indexText, indent, 'left');
        });

        y -= LH * 0.3; // espaço entre cláusulas
      });

      // ── Monta PDF bruto ───────────────────────────────────────────────────
      // Helvetica regular = F1, Helvetica-Bold = F2
      const objs = [];
      let id = 1;

      function obj(content) {
        objs.push({ id: id++, content });
        return objs[objs.length - 1];
      }

      const catalogId = id; obj('<<\n/Type /Catalog\n/Pages 2 0 R\n>>');
      const pagesId   = id; obj(''); // placeholder

      const pageIds = [];
      const streamObjs = [];

      pages.forEach(function(lines) {
        const stream = lines.join('\n');
        const sId = id;
        streamObjs.push({ id: sId, stream });
        obj(''); // placeholder for stream obj
        const pgId = id;
        pageIds.push(pgId);
        obj('<<\n/Type /Page\n/Parent 2 0 R\n/MediaBox [0 0 ' + PW.toFixed(2) + ' ' + PH.toFixed(2) + ']\n' +
            '/Contents ' + sId + ' 0 R\n' +
            '/Resources <<\n  /Font <<\n    /F1 << /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>\n' +
            '    /F2 << /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>\n  >>\n>>\n>>');
      });

      // Corrige objetos placeholder
      const pagesContent = '<<\n/Type /Pages\n/Kids [' + pageIds.map(function(p){ return p + ' 0 R'; }).join(' ') + ']\n/Count ' + pageIds.length + '\n>>';
      objs[1].content = pagesContent;

      // Corrige stream objs
      streamObjs.forEach(function(s, i) {
        const encoded = s.stream;
        objs[s.id - 1].content = '<<\n/Length ' + encoded.length + '\n>>\nstream\n' + encoded + '\nendstream';
      });

      // Serializa
      let pdf = '%PDF-1.4\n';
      const offsets = [];
      objs.forEach(function(o) {
        offsets.push(pdf.length);
        pdf += o.id + ' 0 obj\n' + o.content + '\nendobj\n';
      });

      const xrefOffset = pdf.length;
      pdf += 'xref\n0 ' + (objs.length + 1) + '\n';
      pdf += '0000000000 65535 f \n';
      offsets.forEach(function(off) {
        pdf += off.toString().padStart(10, '0') + ' 00000 n \n';
      });
      pdf += 'trailer\n<<\n/Size ' + (objs.length + 1) + '\n/Root 1 0 R\n>>\n';
      pdf += 'startxref\n' + xrefOffset + '\n%%EOF';

      return pdf;
    }

    document.getElementById('btn-exportar-pdf').addEventListener('click', function() {

    function renumberBlocks() {
      const allBlocos = Array.from(document.querySelectorAll('#contract-content .bloco'));

      let forcePrimeiro = true;
      let secaoNum = 0;
      let currentSecao = '';
      const c = { l1: 0, l2: 0, l3: 0 };

      allBlocos.forEach(function(block) {
        if (block.dataset.type === 'secao') {
          secaoNum++;
          currentSecao = String(secaoNum);
          block.dataset.num = String(secaoNum);
          forcePrimeiro = true;
          // Remove span de índice se existir (legado)
          var idx = block.querySelector('.secao-indice');
          if (idx) idx.remove();
          return;
        }

        if (forcePrimeiro) {
          block.dataset.level = 'primeiro';
          forcePrimeiro = false;
        }

        block.dataset.secao = currentSecao;

        const level = block.dataset.level;
        if (level === 'primeiro') { c.l1++; c.l2 = 0; c.l3 = 0; }
        if (level === 'segundo')  { if (c.l1 === 0) c.l1 = 1; c.l2++; c.l3 = 0; }
        if (level === 'terceiro') { if (c.l1 === 0) c.l1 = 1; if (c.l2 === 0) c.l2 = 1; c.l3++; }
        block.querySelector('.bloco-indice').textContent = formatIndex(level, c);
      });

      refreshAllBlockControls();
      updateExportButton();
      markDirty();
    }

    // --- Drag and drop ---
    const preview = document.getElementById('contract-content');

    const indicator = document.createElement('div');
    indicator.id = 'drop-indicator';
    indicator.style.cssText = 'border-top: 2px dashed black; margin: 2px 0; display: none; pointer-events: none;';
    preview.appendChild(indicator);

    function nearestBlock(target) {
      while (target && target !== preview) {
        if (target.classList && target.classList.contains('bloco')) return target;
        target = target.parentElement;
      }
      return null;
    }

    preview.addEventListener('dragover', function(e) {
      e.preventDefault();
      const target = nearestBlock(e.target);
      if (!target || target === draggedEl) return;
      const rect = target.getBoundingClientRect();
      indicator.style.display = 'block';
      if (e.clientY < rect.top + rect.height / 2) {
        preview.insertBefore(indicator, target);
      } else {
        preview.insertBefore(indicator, target.nextSibling);
      }
    });

    preview.addEventListener('dragleave', function(e) {
      if (!preview.contains(e.relatedTarget)) indicator.style.display = 'none';
    });

    preview.addEventListener('drop', function(e) {
      e.preventDefault();
      if (draggedEl && indicator.style.display !== 'none') {
        preview.insertBefore(draggedEl, indicator);
      }
      indicator.style.display = 'none';
      // garante limpeza do estilo mesmo se dragend não disparar
      if (draggedEl) {
        clearTimeout(draggedEl._dragTimer);
        draggedEl.style.outline   = '';
        draggedEl.style.boxShadow = '';
        draggedEl.style.cursor    = '';
      }
      renumberBlocks();
    });

    // --- Extrai HTML inline de um contenteditable, removendo wrappers de bloco ---
    function flattenHTML(el) {
      let html = el.innerHTML;
      html = html.replace(/<\/(div|p)>/gi, ' ');
      html = html.replace(/<(div|p)[^>]*>/gi, '');
      html = html.replace(/<br\s*\/?>/gi, ' ');
      return html.trim().replace(/\s+/g, ' ');
    }

    // --- Lê/escreve o conteúdo editável de um bloco ---
    function getEditableHTML(block) {
      const p = block.querySelector('p');
      const clone = p.cloneNode(true);
      // Remove índice de seção ou cláusula
      const secaoIdx = clone.querySelector('.secao-indice');
      if (secaoIdx) secaoIdx.remove();
      const clausulaIdx = clone.querySelector('.bloco-indice');
      if (clausulaIdx) clausulaIdx.remove();
      return clone.innerHTML.trim().replace(/^\s/, '');
    }

    function setEditableHTML(block, html) {
      if (block.dataset.type === 'secao') {
        const p = block.querySelector('p');
        const idx = p.querySelector('.secao-indice');
        p.innerHTML = html;
        if (idx) p.insertBefore(idx, p.firstChild);
        return;
      }
      const p = block.querySelector('p');
      const strong = p.querySelector('.bloco-indice');
      while (p.lastChild && p.lastChild !== strong) p.removeChild(p.lastChild);
      const temp = document.createElement('span');
      temp.innerHTML = html;
      p.appendChild(document.createTextNode(' '));
      while (temp.firstChild) p.appendChild(temp.firstChild);
    }

        btn.innerHTML = labels[cmd];

          var input = document.getElementById('input-link-url');

          document.getElementById('modal-link').style.display = 'flex';

      editor.innerHTML       = getEditableHTML(block);
      editor.addEventListener('paste', handlePaste);

      // --- Painel condicional inline ---
      var condAtual = (block.dataset.condicional || '').trim();
      // Parse "variavel operador valor" — operador pode ser ==, !=, >, <, contains
      var condVars = { variavel: '', operador: '==', valor: '' };
      if (condAtual) {
        var m = condAtual.match(/^(\S+)\s+(==|!=|>|<|contains)\s+(.+)$/);

          '</select>' +
          '<select class="cond-edit-valor" style="flex:1;">' +
            '<option value="">selecionar valor...</option>' +
            '<option value="fianca_garantida">fianca_garantida</option>' +

      // Popula com valores existentes
      condPanel.querySelector('.cond-edit-variavel').value = condVars.variavel;

      btnSave.type        = 'button';
      btnSave.textContent = 'salvar';
      btnSave.addEventListener('click', function(e) {
        e.stopPropagation();
        // Valida condicional

          erroEl.style.display = 'block';
          return;
        }
        var novaCondicional = (v && val) ? (v + ' ' + o + ' ' + val) : '';
        exitEditMode(block, flattenHTML(editor), novaCondicional, editUI);

      // Inserção de variável inline no editor de preview
      var varRow = document.createElement('div');

        '<option value="{{modalidade_garantia}}">{{modalidade_garantia}}</option>';

      varBtn.addEventListener('click', function() {

    function exitEditMode(block, newHTML, novaCondicional, editUI) {
      isEditing = false;
      delete block.dataset.editing;
      editUI.remove();
      block.querySelector('p').style.display = '';
      block.style.outline = '';

      if (newHTML !== null) {
        // novaCondicional pode ser string vazia (sem condição) ou expressão
        if (novaCondicional !== null) {
          if (novaCondicional) {
            block.dataset.condicional = novaCondicional;
          } else {
            delete block.dataset.condicional;
          }
        }
        setEditableHTML(block, newHTML);
        renumberBlocks();
      }

      setAllDraggable(true);
    }

    // --- Controles de indentação (apenas cláusulas) ---
    const LEVELS = ['primeiro', 'segundo', 'terceiro'];

    function refreshAllBlockControls() {
      const allBlocos = Array.from(document.querySelectorAll('#contract-content .bloco'));
      let firstClause  = true;
      let prevType     = null;
      allBlocos.forEach(function(block) {
        if (block.dataset.type !== 'clausula') {
          prevType = block.dataset.type;
          return;
        }
        const isFirst      = firstClause;
        const afterSection = prevType === 'secao';
        firstClause        = false;
        prevType           = 'clausula';
        const levelIdx = LEVELS.indexOf(block.dataset.level);
        block.querySelector('.btn-recuar').disabled  = isFirst || levelIdx === 0;
        block.querySelector('.btn-avancar').disabled = isFirst || afterSection || levelIdx === LEVELS.length - 1;
      });
    }

    function buildBtnEditar(div) {
      const btn = document.createElement('button');
      btn.type        = 'button';
      btn.textContent = 'editar';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        div.querySelector('.bloco-controles').style.display = 'none';
        enterEditMode(div);
      });
      return btn;
    }

    function buildBtnRemover(div) {
      const btn = document.createElement('button');
      btn.type        = 'button';
      btn.textContent = 'remover';
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        div.remove();
        renumberBlocks();
      });
      return btn;
    }

    function buildControlesClausula(div) {
      const controles = document.createElement('div');
      controles.className     = 'bloco-controles';
      controles.style.cssText = 'display: none; justify-content: space-between;';

      const esquerda = document.createElement('span');
      const btnOut = document.createElement('button');
      btnOut.type        = 'button';
      btnOut.className   = 'btn-recuar';
      btnOut.textContent = '<- recuar';
      btnOut.addEventListener('click', function(e) {
        e.stopPropagation();
        const i = LEVELS.indexOf(div.dataset.level);
        if (i > 0) div.dataset.level = LEVELS[i - 1];
        renumberBlocks();
      });

      const btnIn = document.createElement('button');
      btnIn.type        = 'button';
      btnIn.className   = 'btn-avancar';
      btnIn.textContent = 'avancar ->';
      btnIn.addEventListener('click', function(e) {
        e.stopPropagation();
        const i = LEVELS.indexOf(div.dataset.level);
        if (i < LEVELS.length - 1) div.dataset.level = LEVELS[i + 1];
        renumberBlocks();
      });

      esquerda.appendChild(btnOut);
      esquerda.appendChild(btnIn);

      const direita = document.createElement('span');
      direita.appendChild(buildBtnEditar(div));
      direita.appendChild(document.createTextNode(' '));
      direita.appendChild(buildBtnRemover(div));

      controles.appendChild(esquerda);
      controles.appendChild(direita);
      return controles;
    }

    function buildControlesSecao(div) {
      const controles = document.createElement('div');
      controles.className     = 'bloco-controles';
      controles.style.cssText = 'display: none; justify-content: flex-end;';

      const direita = document.createElement('span');
      direita.appendChild(buildBtnEditar(div));
      direita.appendChild(document.createTextNode(' '));
      direita.appendChild(buildBtnRemover(div));

      controles.appendChild(direita);
      return controles;
    }

    function attachDragEvents(div) {
      div.addEventListener('mouseenter', function() {
        if (this !== draggedEl && !isEditing) {
          this.style.outline = '1px solid black';
          this.style.cursor  = 'grab';
          const ctrl = this.querySelector('.bloco-controles');
          if (ctrl) ctrl.style.display = 'flex';
        }
      });
      div.addEventListener('mouseleave', function() {
        if (this !== draggedEl && !isEditing) {
          this.style.outline = '';
          this.style.cursor  = '';
          const ctrl = this.querySelector('.bloco-controles');
          if (ctrl) ctrl.style.display = 'none';
        }
      });
      div.addEventListener('mousedown', function() {
        if (!isEditing) document.body.style.cursor = 'grabbing';
      });
      div.addEventListener('mouseup', function() {
        document.body.style.cursor = '';
        if (!isEditing) this.style.cursor = 'grab';
      });
      div.addEventListener('dragstart', function(e) {
        draggedEl = this;
        this.style.cursor = 'grabbing';
        const ctrl = this.querySelector('.bloco-controles');
        if (ctrl) ctrl.style.display = 'none';
        e.dataTransfer.effectAllowed = 'move';
        const self = this;
        self._dragTimer = setTimeout(() => {
          if (draggedEl === self) {
            self.style.outline   = '2px solid black';
            self.style.boxShadow = '2px 2px 6px rgba(0,0,0,0.4)';
          }
        }, 0);
      });
      div.addEventListener('dragend', function() {
        clearTimeout(this._dragTimer);
        this.style.outline   = '';
        this.style.boxShadow = '';
        this.style.cursor    = '';
        document.body.style.cursor = '';
        draggedEl = null;
        indicator.style.display = 'none';
      });
    }

    // --- Criar bloco de seção ---
    function createSecaoBlock(html, condicional) {
      const div = document.createElement('div');
      div.className    = 'bloco';
      div.draggable    = true;
      div.dataset.type = 'secao';
      if (condicional) div.dataset.condicional = condicional;

      div.appendChild(buildControlesSecao(div));

      const p = document.createElement('p');
      p.innerHTML = html;
      div.appendChild(p);

      attachDragEvents(div);
      return div;
    }

    // --- Criar bloco de cláusula ---
    function createClausulaBlock(level, html, condicional) {
      const div = document.createElement('div');
      div.className     = 'bloco';
      div.draggable     = true;
      div.dataset.type  = 'clausula';
      div.dataset.level = level;
      if (condicional) div.dataset.condicional = condicional;

      div.appendChild(buildControlesClausula(div));

      const p = document.createElement('p');
      p.innerHTML = '<strong class="bloco-indice"></strong> ' + html;
      div.appendChild(p);

      attachDragEvents(div);
      return div;
    }

    // --- Lê condicional do formulário ---
    function readCondicional(prefix) {
      var variavel = document.getElementById('cond-' + prefix + '-variavel').value;
      if (!variavel) return '';
      var operador = document.getElementById('cond-' + prefix + '-operador').value;
      var valor    = document.getElementById('cond-' + prefix + '-valor').value.trim();
      return variavel + ' ' + operador + ' ' + valor;
    }

    // --- Validação da condicional no clique ---
    function validarCondicionalAoAdicionar(prefix) {
      var variavel = document.getElementById('cond-' + prefix + '-variavel').value;
      var valor    = document.getElementById('cond-' + prefix + '-valor').value;
      var erro     = document.getElementById('erro-cond-' + prefix);
      // Se variavel selecionada sem valor, bloqueia
      if (variavel && !valor) {
        erro.textContent   = 'Selecione um valor para a condição, ou redefina para "(sempre exibir)".';
        erro.style.display = 'block';
        return false;
      }
      // Se valor selecionado sem variavel (estado impossível pela UI, mas por segurança)
      if (!variavel && valor) {
        erro.textContent   = 'Selecione uma variável para a condição.';
        erro.style.display = 'block';
        return false;
      }
      erro.style.display = 'none';
      return true;
    }

    // --- Botão Adicionar ---
    function handleAdicionar(tipo) {
      if (!validarCondicionalAoAdicionar(tipo)) return;

      let block;

      if (tipo === 'secao') {
        const html = flattenHTML(document.getElementById('editor-secao'));
        if (!html) return;
        block = createSecaoBlock(html, readCondicional('secao'));

      } else {
        const html = flattenHTML(document.getElementById('editor-clausula'));
        if (!html) return;

        // Herda o nível do último bloco de cláusula; default "primeiro"
        const clausulas = document.querySelectorAll('#contract-content .bloco[data-type="clausula"]');
        const lastLevel = clausulas.length > 0 ? clausulas[clausulas.length - 1].dataset.level : 'primeiro';
        block = createClausulaBlock(lastLevel, html, readCondicional('clausula'));
      }

      preview.appendChild(indicator); // garante que o indicador está no final
      preview.insertBefore(block, indicator);
      renumberBlocks();

      document.getElementById('editor-secao').innerHTML = '';
      document.getElementById('editor-clausula').innerHTML = '';
      // Reset conditional fields
      ['secao', 'clausula'].forEach(function(p) {
        document.getElementById('cond-' + p + '-variavel').value = '';
        document.getElementById('cond-' + p + '-valor').value    = '';
      });
    }

    document.getElementById('btn-adicionar-secao').addEventListener('click', function() {
      handleAdicionar('secao');
    });
    document.getElementById('btn-adicionar-clausula').addEventListener('click', function() {
      handleAdicionar('clausula');
    });

    // ── Google Sheets API ─────────────────────────────────────────────────
    // Após publicar o Apps Script, cole a URL abaixo:
    var SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbxk2HtdZjU6FTBCF2Jykf8uOl8YxA48idaSwOfCqMYxxUldH-m3sjqW02fmf8jMm9Uv0w/exec';

    async function apiGet(params) {
      var qs = Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      }).join('&');
      var res = await fetch(SHEETS_API_URL + '?' + qs, { redirect: 'follow' });
      return res.json();
    }

    async function apiPost(body) {
      var res = await fetch(SHEETS_API_URL, {
        method:   'POST',
        headers:  { 'Content-Type': 'text/plain' },
        body:     JSON.stringify(body),
        redirect: 'follow'
      });
      return res.json();
    }

    // ── Salvar / carregar templates (Google Sheets) ───────────────────────

    var currentTemplateName = null;  // nome é a chave única agora
    var templateDirty       = false;
    var loadingTemplate     = false;

    function isNameChanged() {
      return !!(currentTemplateName &&
        document.getElementById('input-nome-template').value.trim() !== currentTemplateName);
    }

    function setCurrentTemplate(name) {
      currentTemplateName = name || null;
      document.getElementById('input-nome-template').value = name || '';
      var btn = document.getElementById('btn-salvar-padrao');
      btn.textContent = name ? 'Salvar alterações' : 'Salvar template';
      document.getElementById('btn-salvar-novo').style.display = 'none';
    }

    function updateExportButton() {
      var hasContent   = document.querySelector('#contract-content .bloco') !== null;
      var nameChanged  = isNameChanged();
      var btn          = document.getElementById('btn-salvar-padrao');
      var btnNovo      = document.getElementById('btn-salvar-novo');
      document.getElementById('btn-exportar-pdf').disabled  = !hasContent;
      document.getElementById('btn-exportar-html').disabled = !hasContent;
      if (currentTemplateName) {
        btn.disabled            = !templateDirty && !nameChanged;
        btnNovo.style.display   = nameChanged ? 'inline-block' : 'none';
      } else {
        btn.disabled            = !hasContent;
        btnNovo.style.display   = 'none';
      }
    }

    function markDirty() {
      if (loadingTemplate) return;
      templateDirty = true;
      updateExportButton();
    }

    function markClean() {
      templateDirty = false;
      updateExportButton();
    }

    // Extrai variáveis {{...}} de um HTML
    function extractVariables(html) {
      var matches = html.match(/\{\{[^}]+\}\}/g) || [];
      return Array.from(new Set(matches)).join(';');
    }

    // Mapeamento símbolo ↔ label textual (evita que Sheets interprete como fórmula)
    var OPERADOR_PARA_LABEL = { '==': 'igual a', '!=': 'diferente de', '>': 'maior que', '<': 'menor que', 'contains': 'contém' };
    var LABEL_PARA_OPERADOR = { 'igual a': '==', 'diferente de': '!=', 'maior que': '>', 'menor que': '<', 'contém': 'contains' };

    // Converte formato Sheets → interno
    function sheetsToInternal(b) {
      var condicional = '';
      if (b.cond_variavel && b.cond_valor) {
        var op = LABEL_PARA_OPERADOR[b.cond_operador] || b.cond_operador || '==';
        condicional = b.cond_variavel + ' ' + op + ' ' + b.cond_valor;
      }
      return {
        type:        b.tipo_conteudo,
        level:       b.nivel || 'primeiro',
        html:        b.conteudo,
        secao:       b.secao_ref || '',
        condicional: condicional
      };
    }

    // Converte formato interno → Sheets
    function internalToSheets(b) {
      var cond = (b.condicional || '').trim();
      var condVars = { variavel: '', operador: '', valor: '' };
      if (cond) {
        var m = cond.match(/^(\S+)\s+(==|!=|>|<|contains)\s+(.+)$/);
        if (m) {
          condVars.variavel = m[1];
          condVars.operador = OPERADOR_PARA_LABEL[m[2]] || m[2]; // salva label textual
          condVars.valor    = m[3].trim();
        }
      }
      var variaveis = extractVariables(b.html || '');
      return {
        tipo_conteudo: b.type,
        nivel:         b.type === 'clausula' ? (b.level || 'primeiro') : '',
        num_secao:     b.type === 'secao' ? (b.num || '') : '',
        secao_ref:     b.type === 'clausula' ? (b.secao || '') : '',
        conteudo:      b.html,
        tem_variavel:  variaveis ? 'Sim' : 'Não',
        variaveis:     variaveis,
        cond_variavel: condVars.variavel,
        cond_operador: condVars.operador,
        cond_valor:    condVars.valor
      };
    }

    function getBlockContent(block) {
      var p = block.querySelector('p').cloneNode(true);
      // Remove índice de cláusula
      var idx = p.querySelector('.bloco-indice');
      if (idx) {
        var next = idx.nextSibling;
        idx.remove();
        if (next && next.nodeType === 3) {
          next.textContent = next.textContent.replace(/^\s/, '');
        }
      }
      // Remove índice de seção
      var secaoIdx = p.querySelector('.secao-indice');
      if (secaoIdx) secaoIdx.remove();
      return p.innerHTML;
    }

    // Lê versão do formulário como dois campos separados
    function getVersaoTipo() {
      var el = document.querySelector('input[name="versao_template"]:checked');
      return el ? el.value : '';
    }
    function getVersaoNumero() {
      return document.getElementById('input-versao-numero').value.trim();
    }

    // Restaura radio + número
    function setVersaoFields(tipo, numero) {
      document.querySelectorAll('input[name="versao_template"]').forEach(function(r) {
        r.checked = r.value === tipo;
      });
      document.getElementById('input-versao-numero').value = numero || '';
    }

    function extractBlocksData() {
      var result = [];
      document.querySelectorAll('#contract-content .bloco').forEach(function(block) {
        result.push({
          type:        block.dataset.type,
          level:       block.dataset.level || 'primeiro',
          html:        getBlockContent(block),
          num:         block.dataset.num   || '',   // número da seção (só seções)
          secao:       block.dataset.secao || '',   // seção pai (só cláusulas)
          condicional: block.dataset.condicional || ''
        });
      });
      return result;
    }

    function loadBlocksData(blocksData) {
      loadingTemplate = true;
      var content = document.getElementById('contract-content');
      content.querySelectorAll('.bloco').forEach(function(b) { b.remove(); });
      blocksData.forEach(function(data) {
        var block = data.type === 'secao'
          ? createSecaoBlock(data.html, data.condicional)
          : createClausulaBlock(data.level, data.html, data.condicional);
        content.insertBefore(block, indicator);
      });
      renumberBlocks();
      loadingTemplate = false;
      markClean();
    }

    function clearEditorFields() {
      document.querySelectorAll('input[name="tipo_bloco"]').forEach(function(r) { r.checked = false; });
      document.getElementById('campo-secao').style.display    = 'none';
      document.getElementById('campo-clausula').style.display = 'none';
      document.getElementById('editor-secao').innerHTML    = '';
      document.getElementById('editor-clausula').innerHTML = '';
      ['secao', 'clausula'].forEach(function(p) {
        document.getElementById('cond-' + p + '-variavel').value = '';
        document.getElementById('cond-' + p + '-valor').value    = '';
        document.getElementById('erro-cond-' + p).style.display  = 'none';
        var btn = document.getElementById('btn-adicionar-' + p);
        btn.disabled      = true;
        btn.style.opacity = '0.4';
      });
    }

    function addCustomTemplateRadio(name) {
      var list = document.getElementById('custom-templates-list');
      if (list.querySelector('[data-key="' + name + '"]')) return;

      var br    = document.createElement('br');
      var label = document.createElement('label');
      label.setAttribute('data-key', name);

      var radio = document.createElement('input');
      radio.type  = 'radio';
      radio.name  = 'tipo_template';
      radio.value = name;
      radio.addEventListener('change', async function() {
        document.getElementById('campos-template').style.display = 'block';
        radio.disabled = true;
        try {
          var data = await apiGet({ action: 'load', name: name });
          if (!data.ok) { alert('Erro ao carregar template: ' + (data.error || '')); return; }
          setCurrentTemplate(name);
          loadBlocksData(data.blocks.map(sheetsToInternal));
          document.querySelectorAll('input[name="status_template"]').forEach(function(r) {
            r.checked = r.value === data.status;
          });
          setVersaoFields(data.versaoTipo, data.versaoNumero);
          document.querySelectorAll('input[name="tipo_contrato"]').forEach(function(r) {
            r.checked = r.value === data.tipo;
          });
          clearEditorFields();
        } catch(e) {
          alert('Erro de conexão ao carregar template.');
        } finally {
          radio.disabled = false;
        }
      });

      var del = document.createElement('button');
      del.type = 'button';
      del.textContent = ' × ';
      del.style.cssText = 'margin-left:4px;font-size:11px;cursor:pointer;';
      del.addEventListener('click', async function(e) {
        e.stopPropagation();
        if (!confirm('Remover "' + name + '"?')) return;
        del.disabled = true;
        try {
          await apiPost({ action: 'delete', name: name });
          br.remove();
          label.remove();
          if (currentTemplateName === name) setCurrentTemplate(null);
        } catch(err) {
          alert('Erro ao remover template.');
          del.disabled = false;
        }
      });

      label.appendChild(radio);
      label.appendChild(document.createTextNode(' ' + name));
      label.appendChild(del);
      list.appendChild(br);
      list.appendChild(label);
    }

    // Carrega templates do Sheets ao abrir a página
    (async function() {
      if (!SHEETS_API_URL || SHEETS_API_URL === 'COLE_AQUI_A_URL_DO_WEBAPP') return;
      try {
        var data = await apiGet({ action: 'list' });
        if (data.ok) {
          data.templates.forEach(function(tpl) {
            addCustomTemplateRadio(tpl.name);
          });
        }
      } catch(e) {
        console.warn('Não foi possível carregar templates do Sheets:', e);
      }
    })();

    document.getElementById('btn-salvar-padrao').addEventListener('click', async function() {
      var btn      = this;
      var name     = document.getElementById('input-nome-template').value.trim();
      var erroNome = document.getElementById('erro-nome-template');
      var statusEl = document.querySelector('input[name="status_template"]:checked');
      var tipoEl   = document.querySelector('input[name="tipo_contrato"]:checked');

      if (!name) {
        erroNome.textContent   = 'Informe um nome para o template.';
        erroNome.style.display = 'block';
        document.getElementById('input-nome-template').focus();
        return;
      }
      erroNome.style.display = 'none';

      btn.disabled    = true;
      btn.textContent = 'Salvando...';

      try {
        var oldName  = currentTemplateName;
        var renaming = !!(oldName && name !== oldName);

        var data = await apiPost({
          action:       'save',
          name:         name,
          oldName:      renaming ? oldName : undefined,
          status:       statusEl ? statusEl.value : '',
          versaoTipo:   getVersaoTipo(),
          versaoNumero: getVersaoNumero(),
          tipo:         tipoEl ? tipoEl.value : '',
          blocks:       extractBlocksData().map(internalToSheets)
        });

        if (!data.ok) { alert('Erro ao salvar template.'); return; }

        if (!oldName) {
          // Novo template: adiciona radio e marca como selecionado
          addCustomTemplateRadio(name);
          var newRadio = document.querySelector('input[name="tipo_template"][value="' + name + '"]');
          if (newRadio) newRadio.checked = true;
        } else if (renaming) {
          // Renomear: remove o radio antigo e adiciona um novo com nome correto
          var oldLabel = document.querySelector('#custom-templates-list [data-key="' + oldName + '"]');
          var oldBr    = oldLabel ? oldLabel.previousSibling : null;
          if (oldLabel) { oldLabel.remove(); if (oldBr && oldBr.nodeName === 'BR') oldBr.remove(); }
          addCustomTemplateRadio(name);
          var renamedRadio = document.querySelector('input[name="tipo_template"][value="' + name + '"]');
          if (renamedRadio) renamedRadio.checked = true;
        }

        setCurrentTemplate(name);
        markClean();
        clearEditorFields();
      } catch(e) {
        alert('Erro ao salvar template: ' + e.message);
      } finally {
        btn.disabled    = false;
        btn.textContent = currentTemplateName ? 'Salvar alterações' : 'Salvar template';
        updateExportButton();
      }
    });

    // Nome do template: limpa erro e reavalia botões ao digitar
    document.getElementById('input-nome-template').addEventListener('input', function() {
      document.getElementById('erro-nome-template').style.display = 'none';
      var btn = document.getElementById('btn-salvar-padrao');
      btn.textContent = (currentTemplateName && !isNameChanged()) ? 'Salvar alterações' : (currentTemplateName ? 'Salvar alterações' : 'Salvar template');
      updateExportButton();
    });

    // Salvar novo template (fork com novo nome, não afeta o original)
    document.getElementById('btn-salvar-novo').addEventListener('click', async function() {
      var btn      = this;
      var name     = document.getElementById('input-nome-template').value.trim();
      var erroNome = document.getElementById('erro-nome-template');
      var statusEl = document.querySelector('input[name="status_template"]:checked');
      var tipoEl   = document.querySelector('input[name="tipo_contrato"]:checked');

      if (!name) {
        erroNome.textContent   = 'Informe um nome para o novo template.';
        erroNome.style.display = 'block';
        document.getElementById('input-nome-template').focus();
        return;
      }
      erroNome.style.display = 'none';

      btn.disabled    = true;
      btn.textContent = 'Salvando...';

      try {
        var data = await apiPost({
          action:       'save',
          name:         name,
          status:       statusEl ? statusEl.value : '',
          versaoTipo:   getVersaoTipo(),
          versaoNumero: getVersaoNumero(),
          tipo:         tipoEl ? tipoEl.value : '',
          blocks:       extractBlocksData().map(internalToSheets)
        });

        if (!data.ok) { alert('Erro ao salvar template.'); return; }

        // Adiciona à lista de templates se ainda não existe
        if (!document.querySelector('input[name="tipo_template"][value="' + name + '"]')) {
          addCustomTemplateRadio(name);
        }

        alert('Novo template "' + name + '" salvo com sucesso!');
      } catch(e) {
        alert('Erro ao salvar template: ' + e.message);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Salvar novo template';
      }
    });
  </script>

</body>
